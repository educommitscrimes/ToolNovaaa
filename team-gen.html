<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Random Team Generator — ToolNova</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.team-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:18px 16px;flex:1;min-width:150px}
.team-name{font-family:var(--display);font-size:.95rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.team-member{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.88rem;color:var(--text);display:flex;align-items:center;gap:8px}
.team-member:last-child{border-bottom:none}
.team-member::before{content:'•';color:var(--purple)}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="tool-page">
  <nav class="topbar">
    <a class="topbar-logo" href="index.html"><span>✦</span> ToolNova</a>
    <span class="topbar-sep">/</span>
    <span class="topbar-tool">Random Team Generator</span>
    <a class="topbar-back" href="index.html">← All Tools</a>
  </nav>
  <div class="tool-content">
    <div class="tool-hero">
      <div class="tool-hero-icon">👥</div>
      <div><div class="tool-hero-title">Random Team Generator</div><div class="tool-hero-desc">Split players into balanced random teams instantly</div></div>
    </div>

    <div class="card">
      <div class="card-title">Players</div>
      <div class="row" style="align-items:flex-start">
        <div class="fg" style="flex:2">
          <label class="lbl">Player names (one per line)</label>
          <textarea id="players" rows="10" placeholder="Alice&#10;Bob&#10;Charlie&#10;Dave&#10;Eve&#10;Frank&#10;Grace&#10;Heidi&#10;Ivan&#10;Judy">Alice
Bob
Charlie
Dave
Eve
Frank
Grace
Heidi
Ivan
Judy</textarea>
        </div>
        <div class="fg" style="flex:1">
          <label class="lbl">Split by</label>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
            <label class="chk"><input type="radio" name="splitMode" value="teams" id="modeTeams" checked onchange="updateUI()"/> Number of teams</label>
            <label class="chk"><input type="radio" name="splitMode" value="size" id="modeSize" onchange="updateUI()"/> Team size</label>
          </div>
          <div id="teamsInput">
            <label class="lbl">Number of teams</label>
            <input type="number" id="numTeams" value="2" min="2" max="20"/>
          </div>
          <div id="sizeInput" style="display:none">
            <label class="lbl">Players per team</label>
            <input type="number" id="teamSize" value="3" min="1" max="20"/>
          </div>
          <div class="fg" style="margin-top:12px">
            <label class="lbl">Options</label>
            <div style="display:flex;flex-direction:column;gap:7px">
              <label class="chk"><input type="checkbox" id="optShuffle" checked/> Shuffle order</label>
              <label class="chk"><input type="checkbox" id="optNames" checked/> Name teams</label>
            </div>
          </div>
        </div>
      </div>
      <div class="btns">
        <button class="btn btn-p" onclick="generate()">Generate teams</button>
        <button class="btn btn-s" onclick="generate()">Re-shuffle 🔀</button>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div class="card-title" style="margin:0" id="resultTitle"></div>
        <button class="copy-btn" onclick="copyTeams()">📋 Copy teams</button>
      </div>
      <div id="teams" style="display:flex;flex-wrap:wrap;gap:12px"></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

const TEAM_NAMES=['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Eta','Theta','Iota','Kappa','Lambda','Mu','Nu','Xi','Omicron','Pi','Rho','Sigma','Tau','Upsilon'];
const TEAM_COLORS=['#8b5cf6','#3b82f6','#22c55e','#ef4444','#f97316','#ec4899','#14b8a6','#eab308','#6366f1','#84cc16'];

function updateUI(){
  const byTeams=document.getElementById('modeTeams').checked;
  document.getElementById('teamsInput').style.display=byTeams?'block':'none';
  document.getElementById('sizeInput').style.display=byTeams?'none':'block';
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function generate(){
  const raw=document.getElementById('players').value;
  let players=raw.split('\n').map(p=>p.trim()).filter(Boolean);
  const byTeams=document.getElementById('modeTeams').checked;
  const doShuffle=document.getElementById('optShuffle').checked;
  const doName=document.getElementById('optNames').checked;

  if(players.length<2){toast('Enter at least 2 players');return;}
  if(doShuffle)players=shuffle(players);

  let numTeams;
  if(byTeams){
    numTeams=Math.min(players.length,Math.max(2,parseInt(document.getElementById('numTeams').value)||2));
  } else {
    const size=Math.max(1,parseInt(document.getElementById('teamSize').value)||3);
    numTeams=Math.ceil(players.length/size);
  }

  const teams=Array.from({length:numTeams},()=>[]);
  players.forEach((p,i)=>teams[i%numTeams].push(p));

  document.getElementById('resultCard').style.display='block';
  document.getElementById('resultTitle').textContent=`${numTeams} teams from ${players.length} players`;
  document.getElementById('teams').innerHTML=teams.map((team,i)=>`
    <div class="team-card">
      <div class="team-name">
        <span style="width:10px;height:10px;border-radius:50%;background:${TEAM_COLORS[i%TEAM_COLORS.length]};flex-shrink:0;display:inline-block"></span>
        ${doName?TEAM_NAMES[i%TEAM_NAMES.length]:'Team '+(i+1)}
        <span style="color:var(--muted);font-weight:400;font-size:.78rem">(${team.length})</span>
      </div>
      ${team.map(p=>`<div class="team-member">${p}</div>`).join('')}
    </div>
  `).join('');
}

function copyTeams(){
  const cards=[...document.querySelectorAll('.team-card')];
  const text=cards.map((c,i)=>{
    const name=c.querySelector('.team-name').textContent.trim();
    const members=[...c.querySelectorAll('.team-member')].map(m=>m.textContent.trim());
    return name+'\n'+members.map(m=>'  • '+m).join('\n');
  }).join('\n\n');
  navigator.clipboard.writeText(text).then(()=>toast('Teams copied!'));
}
</script>
</body>
</html>
