<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Password Generator — ToolNova</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="tool-page">
  <nav class="topbar">
    <a class="topbar-logo" href="index.html"><span>✦</span> ToolNova</a>
    <span class="topbar-sep">/</span>
    <span class="topbar-tool">Password Generator</span>
    <a class="topbar-back" href="index.html">← All Tools</a>
  </nav>
  <div class="tool-content">
    <div class="tool-hero">
      <div class="tool-hero-icon">🔐</div>
      <div><div class="tool-hero-title">Password Generator</div><div class="tool-hero-desc">Generate strong, secure passwords instantly</div></div>
    </div>

    <div class="card">
      <div class="card-title">Configuration</div>
      <div class="fg">
        <label class="lbl">Length: <span id="lenVal">16</span> characters</label>
        <input type="range" min="4" max="128" value="16" id="lenSlider" oninput="document.getElementById('lenVal').textContent=this.value"/>
      </div>
      <div class="fg">
        <label class="lbl">Character types</label>
        <div class="checks">
          <label class="chk"><input type="checkbox" id="chkUpper" checked/> Uppercase A–Z</label>
          <label class="chk"><input type="checkbox" id="chkLower" checked/> Lowercase a–z</label>
          <label class="chk"><input type="checkbox" id="chkNums"  checked/> Numbers 0–9</label>
          <label class="chk"><input type="checkbox" id="chkSym"   checked/> Symbols !@#$</label>
        </div>
      </div>
      <div class="btns">
        <button class="btn btn-p" onclick="generate()">Generate password</button>
        <button class="btn btn-s" onclick="generateMultiple()">Generate 5</button>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none">
      <div class="card-title">Result</div>
      <div class="out" id="result" style="font-size:1.1rem;letter-spacing:.05em;cursor:pointer" onclick="copy(this.textContent)"></div>
      <div class="btns"><button class="copy-btn" onclick="copy(document.getElementById('result').textContent)">📋 Copy password</button></div>
      <div id="strength" style="margin-top:14px"></div>
      <div id="multi" style="margin-top:12px;display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function copy(text) {
  navigator.clipboard.writeText(text).then(()=>toast('Copied!'));
}
function chars() {
  let c='';
  if(document.getElementById('chkUpper').checked) c+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('chkLower').checked) c+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('chkNums').checked)  c+='0123456789';
  if(document.getElementById('chkSym').checked)   c+='!@#$%^&*()-_=+[]{}|;:,.<>?';
  return c;
}
function makePwd(len) {
  const c=chars(); if(!c){toast('Select at least one type');return null;}
  const arr=new Uint32Array(len); crypto.getRandomValues(arr);
  return Array.from(arr).map(v=>c[v%c.length]).join('');
}
function strengthLabel(pwd) {
  const score = [/[A-Z]/.test(pwd),/[a-z]/.test(pwd),/[0-9]/.test(pwd),/[^A-Za-z0-9]/.test(pwd),pwd.length>=12,pwd.length>=20].filter(Boolean).length;
  const labels=[['Very Weak','#ef4444'],['Weak','#f97316'],['Fair','#eab308'],['Good','#84cc16'],['Strong','#22c55e'],['Very Strong','#10b981']];
  const [label,color]=labels[Math.min(score,5)];
  return `<div style="display:flex;align-items:center;gap:10px">
    <div style="flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.08)">
      <div style="width:${(score/5)*100}%;height:100%;border-radius:99px;background:${color};transition:.3s"></div>
    </div>
    <span style="color:${color};font-size:.8rem;font-weight:600;flex-shrink:0">${label}</span>
  </div>`;
}
function generate() {
  const len=+document.getElementById('lenSlider').value;
  const pwd=makePwd(len); if(!pwd)return;
  document.getElementById('result').textContent=pwd;
  document.getElementById('strength').innerHTML=strengthLabel(pwd);
  document.getElementById('multi').innerHTML='';
  document.getElementById('resultCard').style.display='block';
}
function generateMultiple() {
  const len=+document.getElementById('lenSlider').value;
  const passwords=Array.from({length:5},()=>makePwd(len)).filter(Boolean);
  if(!passwords.length)return;
  document.getElementById('result').textContent=passwords[0];
  document.getElementById('strength').innerHTML=strengthLabel(passwords[0]);
  document.getElementById('multi').innerHTML=passwords.slice(1).map(p=>`
    <div class="out" style="cursor:pointer;padding:10px 14px;font-size:.85rem" onclick="copy('${p}')">${p}</div>
  `).join('');
  document.getElementById('resultCard').style.display='block';
}
generate();
</script>
</body>
</html>
